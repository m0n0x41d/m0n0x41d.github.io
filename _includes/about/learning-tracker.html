<div class="col mt-4">
  <h2>My learning tracker</h2>
  <div class="timeline-body bg-themed">
    {% for item in site.data.learning-tracker %}
      <div class="timeline-item">
        <div class="content">
          <h2>{{ item.title }}</h2>
          <h6 class="date">{{ item.from }} at {{ item.where }}</h6>
          <p>{{ item.description }}</p>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
