- title: Declarative programming model
  where: skillsmart.ru
  from: Feb 2022
  description: The next course in the series. Learns to program in a declarative computational model, and to reduce the complexity of a system of any scale to a linear sum of the complexities of its subsystems.

- title: How to understand everything in programming.
  where: skillsmart.ru
  from: Feb 2022
  description: The first, preparatory course from a series of courses on the essence of programming paradigms. The course introduces the scientific view of programming - its fundamental components, and along the way introduces the basics of the multi-paradigm programming language Julia. Based on "Concepts, Techniques, and Models of Computer Programming" by Peter Van Roy and Control Structures for Programming Languages by David A. Fisher

- title: Getting Started with Go
  where: coursera.org Ian Harris course
