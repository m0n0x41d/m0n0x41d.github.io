- title: Practice in programming on ADS, second part.
  where: skillsmart.ru
  from: Jan 2022
  description: Сontinuation of the first course. The topics include trees, tree traversals, binary search trees, balanced binary search trees, heaps, and graphs. The topics cover the definition and implementation of these data structures and algorithms, including operations such as insertion, deletion, and search. Specific topics covered include red-black trees, B-trees, depth-first search, and breadth-first search.

- title: Practice in programming on ADS, first part.
  where: skillsmart.ru
  from: Oct 2021
  description: Based on material from Carnegie Mellon 15-121 and Stanford CS106B. The topics include the analysis of algorithmic complexity, linked lists, variable-size arrays, stacks, queues, hash tables, universal hashing, perfect hashing, associative arrays, sets, caches, and Bloom filters. The topics cover the implementation and analysis of these data structures and algorithms, including their strengths and weaknesses, as well as different methods for dealing with collisions and errors.

